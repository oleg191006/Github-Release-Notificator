global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "release-watcher-local"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:3000"]
        labels:
          env: "local"

  - job_name: "release-watcher-production"
    metrics_path: /metrics
    scheme: https
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["software-engineering-school-6-0.onrender.com"]
        labels:
          env: "production"
